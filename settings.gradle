pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
    plugins {
        id 'org.jetbrains.kotlin.jvm' version '2.3.21'
    }
}
plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

// Should match your modid
rootProject.name = 'mplantzfood'
